<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zia Aviator Working</title>
<style>
body{margin:0;background:#0a0a0a;color:#fff;font-family:Arial;text-align:center}
.top{padding:15px;background:#111;font-size:18px}
.coins{color:#ffd700;font-size:22px;font-weight:bold}
.game{height:50vh;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center}
#mult{font-size:70px;color:#00ff88;font-weight:bold}
#plane{font-size:60px;margin-top:20px}
.crash{color:red !important}
.panel{padding:20px;background:#111}
input{width:150px;height:50px;font-size:24px;text-align:center;background:#222;color:#fff;border:2px solid #444;border-radius:10px}
button{width:100%;height:60px;font-size:22px;font-weight:bold;border:none;border-radius:12px;margin-top:15px}
.bet{background:#00c853;color:#fff}
.cash{background:#d50000;color:#fff;display:none}
#msg{margin-top:10px;font-size:14px;color:#aaa}
</style>
</head>
<body>

<div class="top">Zia Aviator - Balance: <span class="coins" id="bal">100000</span> Coins</div>

<div class="game">
  <div id="mult">1.00x</div>
  <div id="plane">✈️</div>
  <div id="msg">Waiting...</div>
</div>

<div class="panel">
  <input id="betAmt" value="1000" type="number">
  <br>
  <button class="bet" id="betBtn" onclick="placeBet()">BET 1000</button>
  <button class="cash" id="cashBtn" onclick="doCashout()">CASH OUT 0</button>
</div>

<script>
let balance = 100000;
let betAmount = 1000;
let currentMult = 1.00;
let gameTimer = null;
let betPlaced = false;
let cashed = false;
let crashed = false;
let crashPoint = 2.0;

document.getElementById('betAmt').oninput = function(){
  betAmount = parseInt(this.value) || 1000;
  document.getElementById('betBtn').innerText = 'BET ' + betAmount;
}

function updateBalance(){
  document.getElementById('bal').innerText = balance.toLocaleString();
}

function placeBet(){
  if(betPlaced || currentMult > 1.01){
    alert('Wait for next round!');
    return;
  }
  if(balance < betAmount){
    alert('Coins kam hain!');
    return;
  }
  
  balance -= betAmount;
  betPlaced = true;
  cashed = false;
  
  document.getElementById('betBtn').style.display = 'none';
  document.getElementById('cashBtn').style.display = 'block';
  updateBalance();
  document.getElementById('msg').innerText = 'Bet placed! Wait for takeoff...';
}

function doCashout(){
  if(!betPlaced || cashed || crashed){
    return;
  }
  
  cashed = true;
  let win = Math.floor(betAmount * currentMult);
  balance += win;
  
  document.getElementById('cashBtn').innerText = 'CASHED ' + win;
  document.getElementById('cashBtn').disabled = true;
  document.getElementById('msg').innerText = 'You won ' + win + ' coins!';
  
  updateBalance();
}

function startGame(){
  // Reset
  currentMult = 1.00;
  crashed = false;
  crashPoint = 1 + Math.random() * 10; // 1x to 11x crash
  
  document.getElementById('mult').innerText = '1.00x';
  document.getElementById('mult').className = '';
  document.getElementById('msg').innerText = 'Flying...';
  document.getElementById('plane').style.transform = 'translateX(0px)';
  
  // Reset buttons
  betPlaced = false;
  cashed = false;
  document.getElementById('betBtn').style.display = 'block';
  document.getElementById('cashBtn').style.display = 'none';
  document.getElementById('cashBtn').disabled = false;
  document.getElementById('cashBtn').innerText = 'CASH OUT 0';
  
  // Game loop
  gameTimer = setInterval(function(){
    if(crashed) {
      clearInterval(gameTimer);
      return;
    }
    
    currentMult += 0.02;
    document.getElementById('mult').innerText = currentMult.toFixed(2) + 'x';
    document.getElementById('plane').style.transform = 'translateX(' + (currentMult*20) + 'px)';
    
    // Update cashout amount live
    if(betPlaced && !cashed){
      document.getElementById('cashBtn').innerText = 'CASH OUT ' + Math.floor(betAmount * currentMult);
    }
    
    // Crash check
    if(currentMult >= crashPoint){
      crashed = true;
      clearInterval(gameTimer);
      document.getElementById('mult').innerText = currentMult.toFixed(2) + 'x CRASHED!';
      document.getElementById('mult').className = 'crash';
      document.getElementById('msg').innerText = 'Round over. Next in 3s...';
      
      // Reset for next round
      setTimeout(startGame, 3000);
    }
  }, 50);
}

// Start first round after 3 seconds
setTimeout(startGame, 3000);
updateBalance();
</script>

</body>
</html>
