<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Aviator Demo - No Money</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif}
body{background:#1a1a2e;color:#fff;overflow-x:hidden}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:10px;background:#16213e;font-size:12px}
.logo{color:#ff3366;font-weight:bold;font-size:20px}
.history{display:flex;gap:5px;padding:8px;background:#0f3460;overflow-x:auto}
.history span{padding:4px 8px;border-radius:15px;font-size:12px;white-space:nowrap}
.h-green{background:#2ecc71}.h-blue{background:#3498db}.h-red{background:#e74c3c}
.game-area{height:45vh;background:radial-gradient(circle at center,#16213e 0%,#0f0f23 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
#plane{font-size:50px;position:absolute;top:30%;transition:transform 0.1s}
.multiplier{font-size:60px;font-weight:bold;color:#2ecc71;z-index:2}
.crash{color:#e74c3c}
.bet-panel{background:#16213e;margin:10px;padding:15px;border-radius:10px}
.tabs{display:flex;gap:10px;margin-bottom:10px}
.tab{padding:6px 12px;background:#0f3460;border-radius:5px;font-size:13px}
.tab.active{background:#3b82f6}
.row{display:flex;gap:8px;align-items:center;margin:8px 0}
.row input{flex:1;background:#0f3460;border:none;color:#fff;padding:10px;border-radius:8px;text-align:center;font-size:18px}
.btn-amt{padding:8px 12px;background:#0f3460;border:none;color:#fff;border-radius:6px;font-size:13px}
.btn-bet{flex:1;padding:15px;background:#2ecc71;border:none;color:#fff;border-radius:8px;font-size:16px;font-weight:bold}
.btn-cashout{background:#e74c3c;display:none}
.bets-list{max-height:200px;overflow-y:auto;background:#16213e;margin:10px;padding:10px;border-radius:10px;font-size:12px}
.bets-list table{width:100%;border-collapse:collapse}
.bets-list td{padding:6px 2px}
.me{color:#f39c12}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">Aviator</div>
  <div>Balance: <span id="balance">10000</span> Coins</div>
</div>

<div class="history" id="history"></div>

<div class="game-area">
  <div id="plane">✈️</div>
  <div class="multiplier" id="mult">1.00x</div>
  <div id="status"></div>
</div>

<!-- Bet Panel 1 -->
<div class="bet-panel">
  <div class="tabs"><div class="tab active">Bet</div><div class="tab">Auto</div></div>
  <div class="row">
    <button class="btn-amt" onclick="changeBet(1,-5)">-</button>
    <input id="bet1" value="100" readonly>
    <button class="btn-amt" onclick="changeBet(1,5)">+</button>
  </div>
  <div class="row">
    <button class="btn-amt" onclick="setBet(1,20)">20</button>
    <button class="btn-amt" onclick="setBet(1,100)">100</button>
    <button class="btn-amt" onclick="setBet(1,500)">500</button>
    <button class="btn-amt" onclick="setBet(1,1000)">1000</button>
  </div>
  <button class="btn-bet" id="betBtn1" onclick="placeBet(1)">Bet 100</button>
  <button class="btn-bet btn-cashout" id="cashBtn1" onclick="cashOut(1)">Cash Out</button>
</div>

<!-- Bet Panel 2 -->
<div class="bet-panel">
  <div class="tabs"><div class="tab active">Bet</div><div class="tab">Auto</div></div>
  <div class="row">
    <button class="btn-amt" onclick="changeBet(2,-5)">-</button>
    <input id="bet2" value="100" readonly>
    <button class="btn-amt" onclick="changeBet(2,5)">+</button>
  </div>
  <div class="row">
    <button class="btn-amt" onclick="setBet(2,20)">20</button>
    <button class="btn-amt" onclick="setBet(2,100)">100</button>
    <button class="btn-amt" onclick="setBet(2,500)">500</button>
    <button class="btn-amt" onclick="setBet(2,1000)">1000</button>
  </div>
  <button class="btn-bet" id="betBtn2" onclick="placeBet(2)">Bet 100</button>
  <button class="btn-bet btn-cashout" id="cashBtn2" onclick="cashOut(2)">Cash Out</button>
</div>

<div class="bets-list">
  <div style="margin-bottom:8px;font-weight:bold">All Bets</div>
  <table id="betsTable"></table>
</div>

<script>
let balance = 10000;
let multiplier = 1.00;
let gameRunning = false;
let crashed = false;
let crashPoint = 1.50;
let bets = {1:{active:false,amt:100,cashed:false}, 2:{active:false,amt:100,cashed:false}};
let history = [];

function updateUI(){
  document.getElementById('balance').innerText = balance;
  document.getElementById('mult').innerText = multiplier.toFixed(2)+'x';
  document.getElementById('betBtn1').innerText = 'Bet '+bets[1].amt;
  document.getElementById('betBtn2').innerText = 'Bet '+bets[2].amt;
}

function setBet(n,val){ bets[n].amt=val; document.getElementById('bet'+n).value=val; updateUI(); }
function changeBet(n,delta){ bets[n].amt = Math.max(20, bets[n].amt+delta); document.getElementById('bet'+n).value=bets[n].amt; updateUI(); }

function placeBet(n){
  if(gameRunning || bets[n].active) return;
  if(balance < bets[n].amt){ alert('Coins kam hain'); return }
  balance -= bets[n].amt;
  bets[n].active = true;
  document.getElementById('betBtn'+n).style.display='none';
  document.getElementById('cashBtn'+n).style.display='block';
  updateUI();
}

function cashOut(n){
  if(!bets[n].active || bets[n].cashed || crashed) return;
  bets[n].cashed = true;
  let win = bets[n].amt * multiplier;
  balance += win;
  document.getElementById('cashBtn'+n).innerText = 'Cashed '+win.toFixed(0);
  document.getElementById('cashBtn'+n).disabled = true;
  addBetToTable('You', bets[n].amt, multiplier.toFixed(2)+'x', win.toFixed(0));
  updateUI();
}

function startRound(){
  gameRunning = true;
  crashed = false;
  multiplier = 1.00;
  crashPoint = 1 + Math.random()*8; // 1x se 9x crash
  document.getElementById('mult').classList.remove('crash');
  document.getElementById('status').innerText = '';
  document.getElementById('plane').style.transform = 'translate(0px,0px)';

  // Reset bets
  [1,2].forEach(n=>{
    if(bets[n].active &&!bets[n].cashed){
      bets[n].active = false;
      document.getElementById('betBtn'+n).style.display='block';
      document.getElementById('cashBtn'+n).style.display='none';
      document.getElementById('cashBtn'+n).disabled = false;
      document.getElementById('cashBtn'+n).innerText = 'Cash Out';
    }
    bets[n].cashed = false;
  });

  let interval = setInterval(()=>{
    if(crashed){ clearInterval(interval); return }
    multiplier += 0.01 + multiplier*0.0005;
    let x = multiplier*25, y = -multiplier*8;
    document.getElementById('plane').style.transform = `translate(${x}px,${y}px)`;
    document.getElementById('mult').innerText = multiplier.toFixed(2)+'x';

    if(multiplier >= crashPoint){
      crashed = true;
      gameRunning = false;
      document.getElementById('mult').innerText = multiplier.toFixed(2)+'x FLEW AWAY!';
      document.getElementById('mult').classList.add('crash');
      history.unshift(multiplier);
      if(history.length>8) history.pop();
      updateHistory();
      setTimeout(startRound, 3000);
    }
  }, 50);
}

function updateHistory(){
  let h = document.getElementById('history');
  h.innerHTML = history.map(m=>{
    let cls = m<2?'h-blue':m<3?'h-green':'h-red';
    return `<span class="${cls}">${m.toFixed(2)}x</span>`;
  }).join('');
}

function addBetToTable(user, bet, mult, cash){
  let t = document.getElementById('betsTable');
  let row = t.insertRow(0);
  row.innerHTML = `<td class="me">${user}</td><td>${bet}</td><td style="color:#2ecc71">${mult}</td><td style="color:#f39c12">${cash}</td>`;
  if(t.rows.length>10) t.deleteRow(10);
}

// Fake players
setInterval(()=>{
  if(!gameRunning && Math.random()>0.7){
    let u = '***'+Math.floor(Math.random()*90+10);
    let b = [20,100,500,1000][Math.floor(Math.random()*4)];
    let m = (1+Math.random()*2).toFixed(2);
    addBetToTable(u, b, m+'x', (b*m).toFixed(0));
  }
}, 2000);

updateUI();
setTimeout(startRound, 2000);
</script>
</body>
</html>
