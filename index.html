<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
<style>
body{background:#000;color:#fff;font-family:Arial;text-align:center;padding:20px}
h1{color:#ffd700}
#bal{font-size:40px;color:#00ff88;margin:20px}
button{width:100%;height:80px;font-size:30px;font-weight:bold;border:none;border-radius:15px;margin:10px 0}
#bet{background:#00c853;color:#000}
#cash{background:#d50000;color:#fff}
input{width:200px;height:60px;font-size:28px;text-align:center}
#msg{font-size:20px;margin:20px;color:#0ff}
</style>
</head>
<body>

<h1>Zia Test</h1>
<div>Balance: <span id="bal">100000</span> Coins</div>

<input id="amt" value="1000" type="number">

<button id="bet" onclick="doBet()">1. BET LAGAO</button>
<button id="cash" onclick="doCash()" style="display:none">2. CASHOUT KARO</button>

<div id="msg">Pehle BET dabao</div>
<div id="mult">Multiplier: 1.00x</div>

<script>
let balance = 100000;
let betAmt = 1000;
let betLaga = false;
let mult = 1.00;
let timer = null;

function upd(){
  document.getElementById('bal').innerText = balance;
  document.getElementById('amt').value = betAmt;
}

document.getElementById('amt').onchange = function(){
  betAmt = parseInt(this.value);
}

// BET BUTTON
function doBet(){
  if(betLaga){
    alert('Pehle CASHOUT karo bhai!');
    return;
  }
  
  if(balance < betAmt){
    alert('Coins kam hain!');
    return;
  }
  
  // PAISA KAT GAYA
  balance = balance - betAmt;
  betLaga = true;
  
  document.getElementById('bet').style.display = 'none';
  document.getElementById('cash').style.display = 'block';
  document.getElementById('msg').innerText = 'Bet lag gaya! ' + betAmt + ' coins kat gaye';
  
  // Multiplier barhana shuru
  mult = 1.00;
  timer = setInterval(function(){
    mult = mult + 0.05;
    document.getElementById('mult').innerText = 'Multiplier: ' + mult.toFixed(2) + 'x';
    document.getElementById('cash').innerText = '2. CASHOUT ' + Math.floor(betAmt * mult);
  }, 100);
  
  upd();
}

// CASHOUT BUTTON  
function doCash(){
  if(!betLaga){
    alert('Pehle BET lagao!');
    return;
  }
  
  clearInterval(timer);
  
  let win = Math.floor(betAmt * mult);
  balance = balance + win;
  
  document.getElementById('cash').style.display = 'none';
  document.getElementById('bet').style.display = 'block';
  document.getElementById('msg').innerText = 'Cashout ho gaya! ' + win + ' coins mile';
  document.getElementById('mult').innerText = 'Multiplier: 1.00x';
  
  betLaga = false;
  upd();
}

upd();
</script>

</body>
</html>
